<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Theme - WarpTheme</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .upload-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        .upload-area {
            background: var(--bg-color);
            border-radius: var(--border-radius);
            padding: 3rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .upload-area:hover {
            background: var(--border-color);
        }
        .upload-area.dragover {
            background: rgba(76, 151, 255, 0.1);
        }
        .upload-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        .upload-hint {
            color: var(--text-light);
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        .theme-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        .theme-preview-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 1rem;
            position: relative;
        }
        .theme-preview-card .remove-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 10;
            background: #ff4444;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            transition: var(--transition);
            box-shadow: 0 2px 8px rgba(255, 68, 68, 0.3);
        }
        .theme-preview-card .remove-btn:hover {
            background: #ff6666;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 68, 68, 0.4);
        }
        .gradient-preview {
            height: 100px;
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
            position: relative;
            overflow: hidden;
        }
        .gradient-preview::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
        }
        .theme-info {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .theme-info .form-group {
            margin: 0;
        }
        .theme-info label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
            font-weight: 500;
        }
        .theme-info input,
        .theme-info textarea {
            width: 100%;
            padding: 0.625rem;
            border: none;
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: var(--transition);
        }
        .theme-info input:focus,
        .theme-info textarea:focus {
            outline: none;
            background: rgba(76, 151, 255, 0.05);
        }
        .theme-info textarea {
            resize: vertical;
            min-height: 70px;
        }
        .platform-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--bg-color);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-color);
            margin-bottom: 0.75rem;
            font-weight: 500;
        }
        .platform-badge-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }
        .platform-badge-fallback {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .validation-error {
            color: #ff4444;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 4px;
        }
        .upload-form {
            display: none;
        }
        .upload-form.visible {
            display: block;
        }
        .file-selected-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
        }
        .change-file-btn {
            background: var(--bg-color);
            border: none;
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }
        .change-file-btn:hover {
            background: var(--border-color);
        }
        .themes-count {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .supported-mods-section {
            margin-bottom: 2rem;
        }
        .supported-mods-title {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.75rem;
        }
        .mods-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .mod-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-color);
            transition: var(--transition);
        }
        .mod-pill:hover {
            background: var(--bg-color);
        }
        .mod-pill-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }
        .mod-pill-fallback {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    {{template "nav" .}}
    
    <main class="main-content">
        <div class="page-header">
            <h1>Upload Theme</h1>
            <p class="subtitle">Share your theme</p>
        </div>
        
        <div class="upload-container">
            <div class="supported-mods-section">
                <p class="supported-mods-title">Supported Mods:</p>
                <div class="mods-pills">
                    {{range $key, $mod := .Mods}}
                    <div class="mod-pill" title="{{$mod.name}}">
                        {{if $mod.icon}}
                        <img src="{{$mod.icon}}" alt="{{$mod.name}}" class="mod-pill-icon" onerror="this.style.display='none'">
                        {{end}}
                        <span>{{$mod.name}}</span>
                    </div>
                    {{end}}
                </div>
            </div>
            
            <input type="file" id="theme-file" accept=".json" style="display: none;">
            <div class="upload-area" id="upload-area">
                <i data-lucide="upload-cloud" class="upload-icon"></i>
                <p>Drop your theme file here or click to browse</p>
                <p class="upload-hint">Supported format: .json (can contain multiple themes)</p>
            </div>
            
            <div class="upload-form" id="upload-form">
                <div class="file-selected-info">
                    <div>
                        <strong id="file-name"></strong>
                        <span class="themes-count" id="themes-count"></span>
                    </div>
                    <button type="button" class="change-file-btn" id="change-file-btn">Change File</button>
                </div>
                
                <div class="theme-preview-grid" id="theme-preview-grid"></div>
                
                <div class="form-actions">
                    <button type="submit" class="btn primary" id="upload-btn">Upload Themes</button>
                </div>
            </div>
        </div>
    </main>

    {{template "footer" .}}

    <script src="/static/js/main.js"></script>
    <script src="/static/js/upload.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
