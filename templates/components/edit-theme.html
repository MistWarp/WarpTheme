{{ define "edit-theme-modal" }}
<div id="edit-theme-modal" class="modal-overlay" style="display: none;">
    <div class="modal edit-theme-modal">
        <div class="modal-header">
            <h2>Edit Theme</h2>
            <button class="close-modal" data-close-modal="edit-theme-modal">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div class="modal-body">
            <form class="edit-form" id="edit-theme-form">
                <input type="hidden" id="edit-theme-uuid">
                
                <div class="form-group">
                    <label for="edit-theme-name">Theme Name</label>
                    <input type="text" id="edit-theme-name" name="name" required maxlength="100">
                </div>
                
                <div class="form-group">
                    <label for="edit-theme-description">Description</label>
                    <textarea id="edit-theme-description" name="description" placeholder="Enter a description for your theme" maxlength="500"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn secondary" data-close-modal="edit-theme-modal">Cancel</button>
                    <button type="submit" class="btn primary" id="edit-theme-save-btn">
                        <i data-lucide="save"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{ end }}
